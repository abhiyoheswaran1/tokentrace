name: Publish Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Verify release package
        run: npm run release:check

      - name: Verify hosted ChatGPT app readiness
        env:
          CHATGPT_APP_MCP_URL: ${{ secrets.CHATGPT_APP_MCP_URL }}
        run: |
          if [ -z "${CHATGPT_APP_MCP_URL}" ]; then
            echo "CHATGPT_APP_MCP_URL is not configured; skipping hosted ChatGPT app readiness check."
            echo "Public ChatGPT app submission and publish remain a manual OpenAI Dashboard gate."
            exit 0
          fi
          npm run release:chatgpt:check -- --mcp-url "${CHATGPT_APP_MCP_URL}"
          echo "Hosted ChatGPT app readiness checks passed. Submit or publish from the OpenAI Dashboard manual gate."

      - name: Verify tag matches package version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          test "v$VERSION" = "$GITHUB_REF_NAME"

      - name: Extract full changelog release notes
        run: node scripts/extract-release-notes.mjs "$GITHUB_REF_NAME" --out /tmp/tokentrace-release-notes.md

      - name: Publish package
        run: npm publish --access public --provenance

      - name: Install mcp-publisher
        env:
          MCP_PUBLISHER_VERSION: "1.7.9"
        run: |
          set -euo pipefail
          curl -fsSL -o mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/download/v${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz"
          tar -xzf mcp-publisher.tar.gz mcp-publisher
          chmod +x mcp-publisher
          ./mcp-publisher --version

      - name: Validate MCP server manifest
        run: ./mcp-publisher validate

      - name: Authenticate to MCP registry via GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP registry
        run: ./mcp-publisher publish

      - name: Publish GitHub release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TITLE="TokenTrace ${GITHUB_REF_NAME#v}"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --title "$RELEASE_TITLE" --notes-file /tmp/tokentrace-release-notes.md --latest
          else
            gh release create "$GITHUB_REF_NAME" --verify-tag --title "$RELEASE_TITLE" --notes-file /tmp/tokentrace-release-notes.md --latest
          fi
